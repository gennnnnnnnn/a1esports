name: Update Rift Lab data and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        if: github.event_name != 'push'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Riot data
        if: github.event_name != 'push'
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          HISTORY_START_YEAR: 2022
          HISTORICAL_MATCH_COUNT_PER_QUEUE: 20
          ENRICH_MISSING_MATCH_LIMIT: 160
          RIOT_REQUEST_DELAY_MS: 1250
          HISTORICAL_BACKFILL: ${{ github.event_name == 'schedule' && 'false' || 'true' }}
        run: npm run update:data

      - name: Reuse deployed data for code push
        if: github.event_name == 'push'
        run: |
          mkdir -p data
          curl --fail --location --retry 3 --retry-delay 2 \
            --output data/rift-lab.json \
            "https://gennnnnnnnn.github.io/a1esports/data/rift-lab.json?sha=${{ github.sha }}"

      - name: Prepare Pages artifact
        run: |
          mkdir -p dist
          cp index.html players.html coach.html dist/
          cp -R css js data dist/
          touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
