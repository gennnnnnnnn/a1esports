<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="rift-lab-api" content="">
    <title>Players | Rift Lab</title>
    <link rel="preconnect" href="https://ddragon.leagueoflegends.com">
    <link rel="preconnect" href="https://raw.communitydragon.org">
    <link rel="preconnect" href="https://opgg-static.akamaized.net">
    <link rel="stylesheet" href="css/style.css?v=20260625-4">
    <style>
      .league-player-card .lol-brand > span:last-child,
      .league-player-card .peak-badge {
        display: none !important;
      }

      .league-player-card .league-card-header {
        display: none !important;
      }

      .league-player-card .rank-main {
        grid-template-columns: 1fr;
        justify-items: center;
        min-height: 132px;
        padding: 8px 9px;
        overflow: hidden;
        text-align: center;
      }

      .league-player-card .rank-emblem,
      .league-player-card .rank-emblem.iron,
      .league-player-card .rank-emblem.bronze,
      .league-player-card .rank-emblem.silver,
      .league-player-card .rank-emblem.gold,
      .league-player-card .rank-emblem.platinum,
      .league-player-card .rank-emblem.emerald,
      .league-player-card .rank-emblem.diamond,
      .league-player-card .rank-emblem.master,
      .league-player-card .rank-emblem.grandmaster,
      .league-player-card .rank-emblem.challenger,
      .league-player-card .rank-emblem.unranked {
        width: 88px;
        height: 88px;
        margin: -8px auto -6px;
        clip-path: none;
        background: transparent !important;
        box-shadow: none;
        overflow: visible;
      }

      .league-player-card .rank-emblem img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform: scale(1.18);
        transform-origin: center;
        filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.52));
      }

      .league-player-card .form-radar {
        margin-top: 11px;
        padding: 8px 9px 6px;
        border: 1px solid #454a52;
        border-radius: 4px;
        background: #1f2124;
      }

      .league-player-card .form-radar-header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        color: #aeb5bf;
        font-size: 0.66rem;
        font-weight: 950;
        text-transform: uppercase;
      }

      .league-player-card .form-radar svg {
        display: block;
        width: 100%;
        height: 190px;
        margin-top: 0;
      }

      .league-player-card .radar-grid,
      .league-player-card .radar-axis {
        fill: none;
        stroke: rgba(174, 181, 191, 0.32);
        stroke-width: 1;
      }

      .league-player-card .radar-area {
        fill: rgba(49, 215, 255, 0.25);
        stroke: rgba(91, 242, 168, 0.9);
        stroke-width: 2;
      }

      .league-player-card .radar-meta {
        fill: #aeb5bf;
        font-size: 7.5px;
        font-weight: 800;
        dominant-baseline: middle;
      }

      .league-player-card .radar-value {
        fill: #f8fafc;
        font-size: 12.5px;
        font-weight: 900;
        dominant-baseline: middle;
      }

      .league-player-card .radar-rank {
        fill: #f2c15b;
        font-size: 7px;
        font-weight: 850;
      }
    </style>
  </head>
  <body data-page="players">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Rift Lab home">
        <span class="brand-mark">A1</span>
        <span>
          <strong>Rift Lab</strong>
          <small>A1 eSports</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" data-nav="home">Home</a>
        <a href="players.html" data-nav="players">Players</a>
        <a href="coach.html" data-nav="coach">Analysis</a>
      </nav>
      <div class="season-countdown" data-season-countdown>Season countdown loading</div>
      <label class="header-season-control">
        <span>Season</span>
        <select data-global-season-select>
          <option>Loading seasons</option>
        </select>
      </label>
    </header>

    <main class="shell page-stack">
      <section class="page-kicker">
        <p class="eyebrow">Roster</p>
        <h1>Player Form</h1>
      </section>

      <section class="cards-grid player-grid" data-players-list aria-label="Players"></section>
    </main>

    <footer class="site-footer shell">
      <span>Rift Lab pulls public dashboard data from GitHub Actions.</span>
      <span data-updated-at>Waiting for sync</span>
    </footer>

    <script src="js/config.example.js?v=20260625-4"></script>
    <script src="js/app.js?v=20260625-4"></script>
    <script>
      (() => {
        const RECENT_LIMIT = 20;
        const TIERS = ["iron", "bronze", "silver", "gold", "platinum", "emerald", "diamond", "master", "grandmaster", "challenger"];

        function key(value) {
          return String(value || "").toLowerCase().replace(/[^a-z0-9]/g, "");
        }

        function riotId(player) {
          return player && player.riotName && player.tag ? `${player.riotName}#${player.tag}` : (player?.name || "");
        }

        function rankSources(tier) {
          return [
            `https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-shared-components/global/default/images/${tier}.png`,
            `https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/ranked-emblem/emblem-${tier}.png`,
            `https://opgg-static.akamaized.net/images/medals_new/${tier}.png`
          ];
        }

        function setRankSource(img, tier, index = 0) {
          const sources = rankSources(tier);
          img.onerror = () => {
            if (index + 1 < sources.length) setRankSource(img, tier, index + 1);
          };
          img.src = sources[index];
        }

        function patchRankIcons(card) {
          card.querySelectorAll(".rank-emblem").forEach((node) => {
            const tier = TIERS.find((item) => node.classList.contains(item));
            if (!tier) return;
            const current = node.querySelector("img")?.dataset.tier;
            if (current === tier) return;
            node.dataset.tier = tier;
            node.innerHTML = "";
            const img = document.createElement("img");
            img.dataset.tier = tier;
            img.alt = `${tier} rank emblem`;
            setRankSource(img, tier);
            node.appendChild(img);
          });
        }

        function recentMatches(player) {
          const data = window.RIFT_LAB_DATA || {};
          const matches = window.RIFT_LAB_GET_ACTIVE_MATCHES ? window.RIFT_LAB_GET_ACTIVE_MATCHES() : (data.matches || []);
          return matches
            .filter((match) => key(match.player) === key(player.name))
            .sort((a, b) => new Date(b.gameStart).getTime() - new Date(a.gameStart).getTime())
            .slice(0, RECENT_LIMIT);
        }

        function average(matches, field) {
          return matches.length ? matches.reduce((sum, match) => sum + (Number(match[field]) || 0), 0) / matches.length : 0;
        }

        function averageAvailable(matches, field, requireStatVersion = false) {
          const values = matches
            .filter((match) => !requireStatVersion || Number(match.matchStatVersion) >= 2)
            .map((match) => Number(match[field]))
            .filter((value) => Number.isFinite(value));
          return values.length ? values.reduce((sum, value) => sum + value, 0) / values.length : null;
        }

        function clamp(value) {
          return Math.max(0.08, Math.min(1, value));
        }

        function metricValue(value, decimals = 1, suffix = "") {
          if (!Number.isFinite(value)) return "—";
          return `${value.toFixed(decimals)}${suffix}`;
        }

        function patchRecentRecord(card, matches) {
          if (!matches.length) return;
          const wins = matches.filter((match) => match.result === "Win").length;
          const losses = matches.length - wins;
          const record = card.querySelector(".league-record");
          if (!record) return;
          const percent = `${Math.round((wins / matches.length) * 100)}%`;
          const text = `W/L (${wins}/${losses})`;
          if (record.querySelector("strong").textContent !== percent) record.querySelector("strong").textContent = percent;
          if (record.querySelector("span").textContent !== text) record.querySelector("span").textContent = text;
          record.title = `Last ${matches.length} ranked games`;
        }

        function radarMetricValues(matches) {
          const hasGames = matches.length > 0;
          const wins = matches.filter((match) => match.result === "Win").length;
          const wr = hasGames ? wins / matches.length : 0;
          const kda = average(matches, "kda");
          const csMin = average(matches, "csMin");
          const visionMin = average(matches, "visionMin");
          const damageMin = average(matches, "damageMin");
          const goldMin = average(matches, "goldMin");
          const killParticipation = averageAvailable(matches, "killParticipation", true);
          const damageShare = averageAvailable(matches, "damageShare", true);

          return [
            { id: "wr", label: "WR", value: `${Math.round(wr * 100)}%`, rankValue: hasGames ? wr : null, higherBetter: true, score: hasGames ? wr : 0 },
            { id: "kp", label: "KP%", value: metricValue(killParticipation, 0, "%"), rankValue: killParticipation, higherBetter: true, score: clamp((killParticipation || 0) / 75) },
            { id: "kda", label: "KDA", value: kda.toFixed(2), rankValue: hasGames ? kda : null, higherBetter: true, score: clamp(kda / 5) },
            { id: "csm", label: "CS/M", value: csMin.toFixed(1), rankValue: hasGames ? csMin : null, higherBetter: true, score: clamp(csMin / 8) },
            { id: "gpm", label: "GPM", value: Math.round(goldMin).toString(), rankValue: hasGames ? goldMin : null, higherBetter: true, score: clamp(goldMin / 500) },
            { id: "dmgm", label: "DMG/M", value: Math.round(damageMin).toString(), rankValue: hasGames ? damageMin : null, higherBetter: true, score: clamp(damageMin / 1000) },
            { id: "dmgp", label: "DMG%", value: metricValue(damageShare, 0, "%"), rankValue: damageShare, higherBetter: true, score: clamp((damageShare || 0) / 35) },
            { id: "vism", label: "VSPM", value: visionMin.toFixed(2), rankValue: hasGames ? visionMin : null, higherBetter: true, score: clamp(visionMin / 1.3) }
          ];
        }

        function rankedRadarMetrics(player, matches) {
          const data = window.RIFT_LAB_DATA || {};
          const players = data.players || [];
          const total = players.length || 1;
          const currentKey = key(player.name);
          const playerMetrics = players.map((entry) => ({
            key: key(entry.name),
            metrics: new Map(radarMetricValues(recentMatches(entry)).map((metric) => [metric.id, metric]))
          }));

          return radarMetricValues(matches).map((metric) => {
            const current = playerMetrics.find((entry) => entry.key === currentKey)?.metrics.get(metric.id);
            const ownValue = current?.rankValue;
            const values = playerMetrics
              .map((entry) => entry.metrics.get(metric.id)?.rankValue)
              .filter((value) => Number.isFinite(value));
            const better = Number.isFinite(ownValue)
              ? values.filter((value) => metric.higherBetter ? value > ownValue : value < ownValue).length
              : null;
            return {
              ...metric,
              rank: better === null ? `(-/${total})` : `(${better + 1}/${total})`
            };
          });
        }

        function radarSvg(player, matches) {
          const values = rankedRadarMetrics(player, matches);
          const cx = 135;
          const cy = 98;
          const r = 50;
          const point = (ratio, index) => {
            const angle = -Math.PI / 2 + (index * 2 * Math.PI) / values.length;
            return [cx + Math.cos(angle) * r * ratio, cy + Math.sin(angle) * r * ratio];
          };
          const positions = {
            wr: { x: 135, y: 17, anchor: "middle" },
            kp: { x: 204, y: 42, anchor: "start" },
            kda: { x: 218, y: 99, anchor: "start" },
            csm: { x: 196, y: 157, anchor: "start" },
            gpm: { x: 135, y: 177, anchor: "middle" },
            dmgm: { x: 74, y: 157, anchor: "end" },
            dmgp: { x: 52, y: 99, anchor: "end" },
            vism: { x: 66, y: 42, anchor: "end" }
          };
          const polygon = values.map((metric, index) => point(metric.score, index).join(",")).join(" ");
          const grid = [0.33, 0.66, 1].map((ratio) => `<polygon class="radar-grid" points="${values.map((_, index) => point(ratio, index).join(",")).join(" ")}" />`).join("");
          const axes = values.map((_, index) => `<line class="radar-axis" x1="${cx}" y1="${cy}" x2="${point(1, index)[0]}" y2="${point(1, index)[1]}" />`).join("");
          const labels = values.map((metric) => {
            const pos = positions[metric.id];
            return `
              <text class="radar-value" x="${pos.x}" y="${pos.y}" text-anchor="${pos.anchor}">${metric.value}</text>
              <text class="radar-meta" x="${pos.x}" y="${pos.y + 13}" text-anchor="${pos.anchor}">${metric.label} <tspan class="radar-rank">${metric.rank}</tspan></text>
            `;
          }).join("");
          return `<svg viewBox="0 0 270 196" role="img" aria-label="Last ${matches.length} games form radar">${grid}${axes}<polygon class="radar-area" points="${polygon}" />${labels}</svg>`;
        }

        function patchRadar(card, player, matches) {
          let radar = card.querySelector(".form-radar");
          if (!matches.length) {
            radar?.remove();
            return;
          }
          if (!radar) {
            radar = document.createElement("div");
            radar.className = "form-radar";
            card.querySelector(".league-record")?.after(radar);
          }
          const signature = matches.map((match) => match.matchId || match.gameStart).join("|");
          if (radar.dataset.signature === signature) return;
          radar.dataset.signature = signature;
          radar.innerHTML = `<div class="form-radar-header"><span>Last ${matches.length} form</span><span>Radar</span></div>${radarSvg(player, matches)}`;
        }

        function upgradeCards() {
          const data = window.RIFT_LAB_DATA || {};
          const players = data.players || [];
          document.querySelectorAll(".league-player-card").forEach((card) => {
            const id = card.querySelector(".league-id-row h3")?.textContent.trim();
            const player = players.find((entry) => riotId(entry) === id || entry.name === id);
            patchRankIcons(card);
            if (!player) return;
            const matches = recentMatches(player);
            patchRecentRecord(card, matches);
            patchRadar(card, player, matches);
          });
        }

        let queued = false;
        function queueUpgrade() {
          if (queued) return;
          queued = true;
          requestAnimationFrame(() => {
            queued = false;
            upgradeCards();
          });
        }

        document.addEventListener("DOMContentLoaded", () => {
          new MutationObserver(queueUpgrade).observe(document.body, { childList: true, subtree: true });
          [0, 250, 1000].forEach((delay) => setTimeout(upgradeCards, delay));
          window.addEventListener("rift-lab-season-change", queueUpgrade);
        });
      })();
    </script>
  </body>
</html>
