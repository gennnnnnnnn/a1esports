<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="rift-lab-api" content="">
    <title>Matches | Rift Lab</title>
    <link rel="preconnect" href="https://ddragon.leagueoflegends.com">
    <link rel="stylesheet" href="css/style.css?v=20260523-4">
  </head>
  <body data-page="matches">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Rift Lab home">
        <span class="brand-mark">A1</span>
        <span>
          <strong>Rift Lab</strong>
          <small>A1 eSports</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" data-nav="home">Home</a>
        <a href="players.html" data-nav="players">Players</a>
        <a href="coach.html" data-nav="coach">Coach</a>
        <a href="matches.html" data-nav="matches">Matches</a>
      </nav>
    </header>

    <main class="shell page-stack">
      <section class="page-kicker">
        <p class="eyebrow">Ranked history</p>
        <h1>Recent Matches</h1>
      </section>

      <section class="status-slot" data-status></section>

      <section class="toolbar matches-toolbar" aria-label="Match filters">
        <div class="segmented" role="group" aria-label="Queue">
          <button type="button" class="is-active" data-match-queue="all">All</button>
          <button type="button" data-match-queue="420">Solo/Duo</button>
          <button type="button" data-match-queue="440">Flex</button>
        </div>
        <label class="search-field">
          <span>Champion</span>
          <input type="search" data-champion-search placeholder="Filter champions">
        </label>
        <label class="select-field">
          <span>Player</span>
          <select data-player-filter>
            <option value="all">All players</option>
          </select>
        </label>
      </section>

      <section class="match-list" data-matches-list aria-label="Recent matches"></section>
    </main>

    <footer class="site-footer shell">
      <span>Rift Lab pulls public dashboard data from GitHub Actions.</span>
      <span data-updated-at>Waiting for sync</span>
    </footer>

    <script src="js/config.example.js?v=20260523-4"></script>
    <script src="js/app.js?v=20260523-4"></script>
  </body>
</html>
